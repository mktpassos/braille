<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leitura Acessível — Braille 3D Print</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111;
  color:#f5c518;
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
}
.badge{
  background:#1a2a1a;
  color:#22c55e;
  border:1px solid #2a4a2a;
  border-radius:6px;
  padding:6px 16px;
  font-size:.8rem;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:28px;
  text-transform:uppercase;
}
h1{
  font-size:clamp(2rem,9vw,4rem);
  line-height:1.2;
  margin-bottom:32px;
  max-width:90vw;
  color:#f5c518;
}
.btn{
  background:#f5c518;
  color:#000;
  border:none;
  border-radius:14px;
  font-size:1.2rem;
  font-weight:bold;
  padding:18px 36px;
  cursor:pointer;
  margin:8px;
  transition:opacity .2s;
}
.btn:hover{opacity:.85;}
.btn-stop{
  background:#333;
  color:#f5c518;
  border:1px solid #555;
}
.sub{
  color:#555;
  font-size:.8rem;
  margin-top:28px;
  line-height:1.8;
}
.sub a{color:#888;text-decoration:none;}
.status{
  margin-top:20px;
  font-size:.9rem;
  color:#888;
  min-height:24px;
}
.vazio{color:#555;font-size:1.2rem;}
</style>
</head>
<body>

<div class="badge">♿ Leitura Acessível — Braille 3D Print</div>

<h1 id="msg"><span class="vazio">Carregando...</span></h1>

<div>
  <button class="btn" onclick="falar()">🔊 Ouvir novamente</button>
  <button class="btn btn-stop" onclick="parar()">⏹ Parar</button>
</div>

<div class="status" id="status"></div>

<p class="sub">
  Placa em conformidade com <strong style="color:#aaa">ABNT NBR 9050</strong><br>
  Braille 3D Print · ILBES · Prof. Ivan Arenque Passos<br>
  <a href="https://ilbes.org.br" target="_blank">ilbes.org.br</a>
</p>

<script>
// Lê o parâmetro ?t= da URL
var params = new URLSearchParams(window.location.search);
var texto = params.get('t') || '';

// Decodifica (substitui + por espaço)
texto = decodeURIComponent(texto.replace(/\+/g, ' ')).toUpperCase().trim();

var el = document.getElementById('msg');
var st = document.getElementById('status');

if(texto){
  el.textContent = texto;
  document.title = texto + ' — Leitura Acessível';
} else {
  el.innerHTML = '<span class="vazio">Nenhum texto encontrado.</span>';
  st.textContent = 'Escaneie o QR Code de uma placa Braille 3D Print.';
}

function falar(){
  if(!texto) return;
  if(!window.speechSynthesis){
    st.textContent = 'Seu navegador não suporta leitura de voz.';
    return;
  }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(texto);
  u.lang = 'pt-BR';
  u.rate = 0.82;
  u.pitch = 1.0;
  u.onstart  = function(){ st.textContent = '🔊 Lendo...'; };
  u.onend    = function(){ st.textContent = '✔ Concluído.'; };
  u.onerror  = function(){ st.textContent = 'Erro na leitura de voz.'; };
  // Tenta forçar voz em português
  var vozes = window.speechSynthesis.getVoices();
  var voz = vozes.find(v => v.lang.startsWith('pt'));
  if(voz) u.voice = voz;
  window.speechSynthesis.speak(u);
}

function parar(){
  window.speechSynthesis.cancel();
  st.textContent = '';
}

// Lê automaticamente ao carregar
window.addEventListener('load', function(){
  // Aguarda vozes carregarem (necessário em alguns navegadores)
  if(window.speechSynthesis.getVoices().length === 0){
    window.speechSynthesis.addEventListener('voiceschanged', function(){
      setTimeout(falar, 400);
    });
  } else {
    setTimeout(falar, 600);
  }
});
</script>
</body>
</html>
